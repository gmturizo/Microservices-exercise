# Configuración del servidor
server.port=8081

# Nombre del microservicio
spring.application.name=service-vehiculo

# Configuración de H2 en memoria
spring.datasource.url=jdbc:h2:mem:vehiculodb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=gmturizo
spring.datasource.password=1234

# Habilitar la consola web de H2 para ver las tablas
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Configuración de JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.output.ansi.enabled=always
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
