spring.application.name=api-gateway

server.port=8080
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# --- CONFIGURACIÓN DE LA RUTA (Traducida de tu tutorial) ---
spring.cloud.gateway.routes[0].id=flota-route
spring.cloud.gateway.routes[0].uri=lb://SERVICE-FLOTA
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/flotas/**